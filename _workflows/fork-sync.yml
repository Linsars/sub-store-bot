name: Fork Sync

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Sync & Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork || github.event_name == 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync upstream
        id: sync
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 添加上游
          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream https://github.com/Linsars/sub-store-bot.git
          else
            git remote add upstream https://github.com/Linsars/sub-store-bot.git
          fi

          git fetch --prune origin main
          git fetch --prune upstream main

          # 检查是否已是最新
          if git merge-base --is-ancestor upstream/main origin/main; then
            echo "✨ 已是最新"
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 备份本地配置（不随上游覆盖）
          mkdir -p /tmp/wfbak
          cp -r .github/workflows/* /tmp/wfbak/ 2>/dev/null || true
          cp wrangler.toml /tmp/wfbak/ 2>/dev/null || true

          # 强制覆盖所有文件为上游版本（比 merge 可靠，不会残留本地改动）
          git checkout main
          git reset --hard origin/main
          git checkout upstream/main -- .

          # 恢复本地配置（先删掉上游新增的 workflow 文件）
          rm -rf .github/workflows
          mkdir -p .github/workflows
          cp -r /tmp/wfbak/* .github/workflows/ 2>/dev/null || true
          cp /tmp/wfbak/wrangler.toml . 2>/dev/null || true
          rm -rf /tmp/wfbak

          # 排除 workflow 文件变更（GITHUB_TOKEN 无 workflows 写权限）
          git reset HEAD .github/workflows/ 2>/dev/null || true
          # 只在有变更时 commit（失败也不阻断）
          git diff --cached --quiet || git commit --no-edit || true
          git push origin main
          echo "changed=true" >> $GITHUB_OUTPUT

      - name: Deploy to CF
        if: steps.sync.outputs.changed == 'true'
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_WORKER_NAME: ${{ secrets.CF_WORKER_NAME || github.event.repository.name }}
        run: python3 deploy.py
