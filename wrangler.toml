name = "sub-store-bot"
main = "worker.mjs"
compatibility_date = "2025-09-27"
compatibility_flags = ["nodejs_compat"]

# 一键部署时 KV Namespace 会自动创建（不写 id）
# 如需复用已有 namespace，可在部署后把真实 ID 填到 Cloudflare Dashboard
[[kv_namespaces]]
binding = "KV"

[vars]
ALLOWED_USERS = "允许的用户 ID（逗号分隔），不设则全部开放"

# Secrets are uploaded via GitHub Actions and should not be declared here.
# CLIP_URL = "这个进去之后再设置成路由到worker的域名"
# 短链域名 — 部署后在 Cloudflare Dashboard 设置
# 类型: plain_text
# 值: https://your-domain.workers.dev
# 或者用自定义域名
# name = "CLIP_URL"
# type = "plain_text"
