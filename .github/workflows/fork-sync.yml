name: Fork Sync

on:
  schedule:
    - cron: "0 6 * * *"   # 每天北京时间 14:00 执行
  workflow_dispatch:        # 也可手动触发

permissions:
  contents: write
  actions: write

jobs:
  sync:
    name: Sync with upstream
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: main

      - name: Configure Git and remotes
        env:
          SYNC_PAT: ${{ secrets.SYNC_PAT }}
        run: |
          set -euo pipefail
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main || git checkout -b main

          # 添加上游仓库（本项目）
          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream https://github.com/Linsars/sub-store-bot.git
          else
            git remote add upstream https://github.com/Linsars/sub-store-bot.git
          fi

          # 如果用 PAT 就换成带 token 的 origin URL，允许推送 workflow 文件
          if [ -n "${SYNC_PAT:-}" ]; then
            git remote set-url origin "https://x-access-token:${SYNC_PAT}@github.com/${{ github.repository }}.git"
            echo "✅ 检测到 SYNC_PAT，workflow 文件变更也会同步。"
          else
            echo "⚠️ 未配置 SYNC_PAT，上游 workflow 文件变更将被跳过。"
            echo "   如需同步 workflow 文件，请创建 PAT → 仓库 Settings → Secrets → 添加 SYNC_PAT"
          fi

          git fetch --prune origin main
          git fetch --prune upstream main

      - name: Merge upstream main into fork
        env:
          SYNC_PAT: ${{ secrets.SYNC_PAT }}
        run: |
          set -euo pipefail

          ORIGIN_SHA="$(git rev-parse origin/main)"
          UPSTREAM_SHA="$(git rev-parse upstream/main)"

          if [ "${ORIGIN_SHA}" = "${UPSTREAM_SHA}" ]; then
            echo "✨ 已是最新，无需同步。"
            exit 0
          fi

          # 如果没有 PAT 且上游改了 workflow 文件，跳过本次同步
          if [ -z "${SYNC_PAT:-}" ]; then
            WORKFLOW_DIFF="$(git diff --name-only "${ORIGIN_SHA}" "${UPSTREAM_SHA}" -- .github/workflows || true)"
            if [ -n "${WORKFLOW_DIFF}" ]; then
              echo "::notice title=Fork Sync skipped::上游 workflow 文件有变更，"
              echo "默认 GITHUB_TOKEN 不能创建或更新 workflow 文件。"
              echo "如需同步，请配置 SYNC_PAT（repo + workflow 权限）后手动重新运行。"
              exit 0
            fi
          fi

          # 合并上游 main
          echo "🚀 正在合并上游 main..."
          git merge upstream/main --no-edit

          # 推送到 fork
          git push origin main
          echo "✅ 同步完成！"
