name: Deploy Worker

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          # KV Namespace ID — 一键部署后去 Dashboard 查看，设为 Secret
          # 如果没设， wrangler 会创建一个新的 namespace
          vars: |
            CLIP_URL: ${{ secrets.CLIP_URL || '' }}
          secrets: |
            BOT_TOKEN
        env: 
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}      # ← GitHub Secret 转为环境变量
