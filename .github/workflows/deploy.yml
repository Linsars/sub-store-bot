name: Deploy Worker

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          wranglerVersion: '4.111.0'
          command: deploy
          # KV Namespace ID — 一键部署后去 Dashboard 查看，设为 Secret
          # 如果没设， wrangler 会创建一个新的 namespace
          vars: |
            CLIP_URL: ${{ secrets.CLIP_URL || '' }}

      - name: Update BOT_TOKEN secret
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          if [ -n "$BOT_TOKEN" ]; then
            printf '%s' "$BOT_TOKEN" | npx wrangler secret put BOT_TOKEN --name sub-store-bot
          else
            echo "BOT_TOKEN secret is empty; skipping"
          fi
