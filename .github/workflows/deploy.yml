name: Deploy Worker

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wrangler
        run: npm install -g wrangler@4.111.0

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLIP_URL: ${{ secrets.CLIP_URL || '' }}
        run: |
          if [ -n "$CLIP_URL" ]; then
            npx wrangler deploy --config wrangler.toml --var CLIP_URL="$CLIP_URL"
          else
            npx wrangler deploy --config wrangler.toml
          fi

      - name: Update BOT_TOKEN secret
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          if [ -n "$BOT_TOKEN" ]; then
            printf '%s' "$BOT_TOKEN" | npx wrangler secret put BOT_TOKEN --name sub-store-bot
          else
            echo "BOT_TOKEN secret is empty; skipping"
          fi
